fecha_inicio: "2015-01-01"
fecha_fin: "2024-12-31"

# Cross-validation
n_folds: 5
embargo_days: 10

# LPI algorithm
random_state: 42
k_min: 2
k_max: 15
bootstrap_b: 20
bootstrap_subsample: 5000
gmm_reg_covar: 1.0e-5
gmm_max_iter: 300

# Target construction
target_proxy: "rv30_x_premium"
iv_premium: 1.04
target_threshold: 1.3   # rv_5_forward > iv_level * target_threshold → y=1
rv5_window: 5            # days forward for realized vol
rv30_window: 30          # days backward for IV proxy

# Feature windows
rv20_window: 20
vol_of_vol_inner: 5
vol_of_vol_outer: 20
dvol_short: 5
dvol_long: 60
momentum_window: 20

# Data quality
min_tickers_pct: 0.833   # abort if fewer than 25/30 download OK
min_days_per_ticker: 2000

# Diagnostics
shuffle_n_permutations: 12
stability_seeds:
  - 42
  - 7
  - 123
shuffle_collapse_tolerance: 0.02   # expected: 0.50 ± this

# Decision thresholds for verdict
thresholds:
  no_signal: 0.53
  marginal: 0.56
  weak: 0.60
  moderate: 0.65
  # above 0.65 → STRONG (investigate overfitting)
  suspicious_high: 0.70  # stop and investigate if AUC exceeds this
