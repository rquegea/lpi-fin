# EXPERIMENTO DESCARTADO (2026-04-09)
# Resultado: v3 single AUC 0.6015, v3 ensemble AUC 0.5785
# Peor que baseline CBOE 4-features (AUC 0.6253).
# Razón probable: maldición de dimensionalidad en GMM al pasar de
# 4 a 7 features. Se mantiene código como registro del intento.
# Modelo final del proyecto: CBOE 4-features. Ver scripts 09-13.

# Config v3: CBOE 4 features + 3 OHLCV features (skew, kurt, vol autocorr)
# Target: rv_5_forward > iv_cboe * 1.3  (unchanged from CBOE run)
# Ensemble: 7 seeds of LPI, averaged scores

universe:
  - AAPL
  - MSFT
  - GOOGL
  - AMZN
  - META
  - NVDA
  - TSLA
  - JPM
  - V
  - WMT
  - JNJ
  - PG
  - XOM
  - CVX
  - HD
  - MA
  - BAC
  - DIS
  - ADBE
  - NFLX
  - CRM
  - PFE
  - KO
  - PEP
  - INTC
  - CSCO
  - ORCL
  - MRK
  - ABT
  - NKE

fecha_inicio: "2015-01-01"
fecha_fin: "2024-12-31"

# CBOE index mapping (documented in src/cboe_data.py)
cboe_symbols:
  - "^VIX"
  - "^VXN"

# All 7 active features for v3
active_features:
  - iv_rv_spread_cboe
  - log_range
  - vol_of_vol
  - log_dvol
  - skew_60d
  - kurt_60d
  - vol_autocorr_5d

# Cross-validation — identical to all previous runs
n_folds: 5
embargo_days: 10

# LPI algorithm — identical to all previous runs
random_state: 42
k_min: 2
k_max: 15
bootstrap_b: 20
bootstrap_subsample: 5000
gmm_reg_covar: 1.0e-5
gmm_max_iter: 300

# Target construction
target_threshold: 1.3
rv5_window: 5
rv30_window: 30  # kept for reference, not used in v2/v3

# Feature windows — inherited from CBOE run
rv20_window: 20
vol_of_vol_inner: 5
vol_of_vol_outer: 20
dvol_short: 5
dvol_long: 60
momentum_window: 20  # kept for reference, not used in v3

# New feature windows for v3
skew_window: 60
kurt_window: 60
vol_autocorr_inner: 5
vol_autocorr_outer: 20

# Ensemble seeds (7 models)
ensemble_seeds:
  - 42
  - 7
  - 123
  - 2024
  - 99
  - 314
  - 2718

# Data quality — raised minimum: 7 features need 60d warmup
min_tickers_pct: 0.833
min_days_per_ticker: 2000

# Diagnostics
shuffle_n_permutations: 12
stability_seeds:
  - 42
  - 7
  - 123
shuffle_collapse_tolerance: 0.02

# Decision thresholds
thresholds:
  no_signal: 0.53
  marginal: 0.56
  weak: 0.60
  moderate: 0.65
  suspicious_high: 0.72
