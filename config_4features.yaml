# Config for 4-feature experiment: only features with positive delta from ablation.
# Dropped: iv_level (delta=-0.0016), rv_20 (delta=-0.0035), momentum (delta=-0.0080)
# Kept:    iv_rv_spread (+0.0057), log_range (+0.0036), vol_of_vol (+0.0162), log_dvol (+0.0017)
#
# DO NOT modify config.yaml — this file is for comparison only.

universe:
  - AAPL
  - MSFT
  - GOOGL
  - AMZN
  - META
  - NVDA
  - TSLA
  - JPM
  - V
  - WMT
  - JNJ
  - PG
  - XOM
  - CVX
  - HD
  - MA
  - BAC
  - DIS
  - ADBE
  - NFLX
  - CRM
  - PFE
  - KO
  - PEP
  - INTC
  - CSCO
  - ORCL
  - MRK
  - ABT
  - NKE

fecha_inicio: "2015-01-01"
fecha_fin: "2024-12-31"

# Active features for this experiment (subset of the 7)
active_features:
  - iv_rv_spread
  - log_range
  - vol_of_vol
  - log_dvol

# Cross-validation — identical to baseline
n_folds: 5
embargo_days: 10

# LPI algorithm — identical to baseline
random_state: 42
k_min: 2
k_max: 15
bootstrap_b: 20
bootstrap_subsample: 5000
gmm_reg_covar: 1.0e-5
gmm_max_iter: 300

# Target construction — identical to baseline
target_proxy: "rv30_x_premium"
iv_premium: 1.04
target_threshold: 1.3
rv5_window: 5
rv30_window: 30

# Feature windows (needed to build features even if some are dropped)
rv20_window: 20
vol_of_vol_inner: 5
vol_of_vol_outer: 20
dvol_short: 5
dvol_long: 60
momentum_window: 20

# Data quality
min_tickers_pct: 0.833
min_days_per_ticker: 2000

# Diagnostics
shuffle_n_permutations: 12
stability_seeds:
  - 42
  - 7
  - 123
shuffle_collapse_tolerance: 0.02

# Decision thresholds — identical to baseline
thresholds:
  no_signal: 0.53
  marginal: 0.56
  weak: 0.60
  moderate: 0.65
  suspicious_high: 0.72  # lower bar: 4-feature model is simpler, less prone to overfit
